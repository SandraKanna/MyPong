# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name localhost;

    # Self-signed cert generated by scripts/generate-dev-cert.sh.
    # docker-compose.yml must mount ./nginx/certs:/etc/nginx/certs:ro
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Docker's internal DNS resolver.
    # Required to use variables in proxy_pass — defers hostname resolution to
    # request time instead of nginx startup, so nginx starts cleanly even when
    # an upstream (e.g. gateway-ws) is not yet running.
    resolver 127.0.0.11 valid=30s;

    # Static SPA build.
    # The nginx Dockerfile must COPY the Vite dist/ output into this path.
    root  /usr/share/nginx/html;
    index index.html;

    # ── Static SPA ────────────────────────────────────────────────────────────

    location / {
        # Fallback to index.html so React Router handles client-side routes
        # without nginx returning 404 on direct URL access or page reload.
        try_files $uri $uri/ /index.html;
    }

    # ── User avatars ──────────────────────────────────────────────────────────

    location /avatars/ {
        # Served directly from the avatars_data volume (mounted :ro in compose).
        alias /var/www/avatars/;
    }

    # ── REST API proxy → gateway-api ──────────────────────────────────────────

    location /api/ {
        set $gateway_api   http://gateway-api:4000;
        proxy_pass         $gateway_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket proxy → gateway-ws ──────────────────────────────────────────

    # gateway-ws does not exist until Phase 3. Using a variable in proxy_pass
    # forces runtime DNS resolution (via resolver above) so nginx starts without
    # error. Requests to /ws will return 502 until gateway-ws is running —
    # which is the correct behaviour for Phases 1 and 2.
    location /ws {
        set $gateway_ws http://gateway-ws:4500;
        proxy_pass          $gateway_ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
    }
}
