name: mypong

# Dockerfiles for all custom services are pending (added per phase).
# Running "make up" will fail until at least Fase 1 Dockerfiles exist.

services:

  # ── Public edge ──────────────────────────────────────────────────────────────

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    # nginx.conf is baked into the image via COPY in nginx/Dockerfile — no bind-mount needed.
    # Only certs are mounted: generated locally by scripts/generate-dev-cert.sh, never baked in.
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - avatars_data:/var/www/avatars:ro
    networks:
      - frontend-net
    depends_on:
      gateway-api:
        condition: service_healthy
      gateway-ws:
        condition: service_healthy
    # TODO: healthcheck

  # ── Gateways (bridge frontend-net ↔ backend-net) ─────────────────────────────

  gateway-api:
    build:
      context: .
      dockerfile: services/gateway-api/Dockerfile
    expose:
      - "4000"
    # TODO: remove this ports mapping once nothing hits gateway-api directly —
    # currently still required by: native Vite dev proxy (/api → :4010 in
    # vite.config.ts) and the auth-service/gateway-api smoke tests. Revisit in
    # Fase 7 cleanup pass, or sooner if those paths get rerouted through nginx.
    ports:
      - "4010:4000"
    environment:
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
    networks:
      - frontend-net
      - backend-net
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  gateway-ws:
    build:
      context: .
      dockerfile: services/gateway-ws/Dockerfile
    expose:
      - "4500"
    # TODO: remove this ports mapping once testing via nginx /ws is the only path
    ports: 
      - "4500:4500"
    environment:
      PORT: "4500"
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    networks:
      - frontend-net
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4500/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend services (backend-net only) ──────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    expose:
      - "4001" # reachable by other containers on backend-net (e.g. gateway-api)
    # TODO: remove this ports mapping once gateway-api is in make up and acts
    # as the sole entry point for /api/auth/*. Direct access to :4001 is only
    # needed while gateway-api runs natively (not yet in the compose stack).
    ports:
      - "4001:4001"
    environment:
      PORT: "4001"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    expose:
      - "4002"
    environment:
      PORT: "4002"
      DATABASE_URL: ${DATABASE_URL}
      AVATARS_DIR: /var/www/avatars
      GATEWAY_WS_URL: ws://gateway-ws:4500
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    volumes:
      - avatars_data:/var/www/avatars
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      gateway-ws:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  game-service:
    build:
      context: .
      dockerfile: services/game-service/Dockerfile
    environment:
      GATEWAY_WS_URL: ws://gateway-ws:4500
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    networks:
      - backend-net
    depends_on:
      gateway-ws:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  match-service:
    build:
      context: .
      dockerfile: services/match-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GATEWAY_WS_URL: ws://gateway-ws:4500
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    networks:
      - backend-net
    depends_on:
      gateway-ws:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  tournament-service:
    build:
      context: .
      dockerfile: services/tournament-service/Dockerfile
    environment:
      GATEWAY_WS_URL: ws://gateway-ws:4500
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - backend-net
    depends_on:
      - gateway-ws
      - postgres
    # TODO: healthcheck

  ia-bot-service:
    build:
      context: .
      dockerfile: services/ia-bot-service/Dockerfile
    environment:
      GATEWAY_WS_URL: ws://gateway-ws:4500
    networks:
      - backend-net
    depends_on:
      - gateway-ws
    # TODO: healthcheck

  # ── Data ─────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ── Networks ───────────────────────────────────────────────────────────────────

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  avatars_data:
