name: mypong

# Dockerfiles for all custom services are pending (added per phase).
# Running "make up" will fail until at least Fase 1 Dockerfiles exist.

services:

  # ── Public edge ──────────────────────────────────────────────────────────────

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    # nginx.conf is baked into the image via COPY in nginx/Dockerfile — no bind-mount needed.
    # Only certs are mounted: generated locally by scripts/generate-dev-cert.sh, never baked in.
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - avatars_data:/var/www/avatars:ro
    networks:
      - frontend-net
    depends_on:
      gateway-api:
        condition: service_healthy
      # gateway-ws excluded from depends_on — no real Dockerfile yet
      # (Phase 3). Re-add once it exists, so nginx doesn't depend on a
      # service it can't build or start.
    # TODO: healthcheck

  # ── Gateways (bridge frontend-net ↔ backend-net) ─────────────────────────────

  gateway-api:
    build:
      context: .
      dockerfile: services/gateway-api/Dockerfile
    expose:
      - "4000"
    # TODO: remove this ports mapping once nginx is implemented
    ports:
      - "4010:4000"
    environment:
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
    networks:
      - frontend-net
      - backend-net
    depends_on:
      auth-service:
        condition: service_healthy
      # - user-service #no Dockerfile yet
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  gateway-ws:
    build:
      context: .
      dockerfile: services/gateway-ws/Dockerfile
    expose:
      - "4500" # NETWORK
    environment:
      PORT: "4500" # CONFIG for Node
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - frontend-net
      - backend-net
    # TODO: healthcheck

  # ── Backend services (backend-net only) ──────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    expose:
      - "4001" # reachable by other containers on backend-net (e.g. gateway-api)
    # TODO: remove this ports mapping once gateway-api is in make up and acts
    # as the sole entry point for /api/auth/*. Direct access to :4001 is only
    # needed while gateway-api runs natively (not yet in the compose stack).
    ports:
      - "4001:4001"
    environment:
      PORT: "4001"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    expose:
      - "4002"
    environment:
      PORT: "4002"
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - avatars_data:/var/www/avatars
    networks:
      - backend-net
    depends_on:
      - postgres
    # TODO: healthcheck

  game-service:
    build:
      context: .
      dockerfile: services/game-service/Dockerfile
    environment:
      GATEWAY_WS_URL: ws://gateway-ws:4500
    networks:
      - backend-net
    depends_on:
      - gateway-ws
    # TODO: healthcheck

  matchmaking-service:
    build:
      context: .
      dockerfile: services/matchmaking-service/Dockerfile
    environment:
      GATEWAY_WS_URL: ws://gateway-ws:4500
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - backend-net
    depends_on:
      - gateway-ws
      - postgres
    # TODO: healthcheck

  tournament-service:
    build:
      context: .
      dockerfile: services/tournament-service/Dockerfile
    environment:
      GATEWAY_WS_URL: ws://gateway-ws:4500
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - backend-net
    depends_on:
      - gateway-ws
      - postgres
    # TODO: healthcheck

  ia-bot-service:
    build:
      context: .
      dockerfile: services/ia-bot-service/Dockerfile
    environment:
      GATEWAY_WS_URL: ws://gateway-ws:4500
    networks:
      - backend-net
    depends_on:
      - gateway-ws
    # TODO: healthcheck

  # ── Data ─────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ── Networks ───────────────────────────────────────────────────────────────────

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  avatars_data:
