name: mypong

services:

  # ── Public edge ──────────────────────────────────────────────────────────────

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    # nginx.conf is baked into the image via COPY in nginx/Dockerfile — no bind-mount needed.
    # Only certs are mounted: generated locally by scripts/generate-dev-cert.sh, never baked in.
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - avatars_data:/var/www/avatars:ro
    networks:
      - frontend-net
    depends_on:
      gateway-api:
        condition: service_healthy
      gateway-ws:
        condition: service_healthy
    healthcheck:
      # wget can't be used here: nginx's port-80 block always 301s to https, busybox
      # wget follows that redirect with no way to disable it, and it has no
      # --no-check-certificate equivalent — so it can never get past the self-signed
      # cert. curl is already present in nginx:alpine and supports -k for that.
      test: ["CMD", "curl", "-kfsS", "https://127.0.0.1/", "-o", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Gateways (bridge frontend-net ↔ backend-net) ─────────────────────────────

  gateway-api:
    build:
      context: .
      dockerfile: services/gateway-api/Dockerfile
    expose:
      - "4000"
    # Native dev only: needed for the native Vite proxy and this service's
    # own smoke test [see services/gateway-api/README.md, "Local (native)"].
    # Commented by default — uncomment while using that flow.
    # ports:
    #   - "127.0.0.1:4010:4000"
    environment:
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
    networks:
      - frontend-net
      - backend-net
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  gateway-ws:
    build:
      context: .
      dockerfile: services/gateway-ws/Dockerfile
    expose:
      - "4500"
    # Native dev only: needed by gateway-ws's own smoke test, or when
    # game-service/match-service run natively [see services/gateway-ws/README.md,
    # "Local (native)"]. Commented by default — uncomment while using that flow.
    # ports:
    #   - "127.0.0.1:4500:4500"
    environment:
      PORT: "4500"
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    networks:
      - frontend-net
      - backend-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4500/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend services (backend-net only) ──────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    expose:
      - "4001" # reachable by other containers on backend-net (e.g. gateway-api)
    # Native dev only: needed when gateway-api runs outside Docker [see
    # services/auth-service/README.md, "Local (native)"]. Commented by
    # default — uncomment while using that flow.
    # ports:
    #   - "127.0.0.1:4001:4001"
    environment:
      PORT: "4001"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # Native dev only: drops the refresh cookie's Secure flag so it survives
      # over plain http:// (e.g. the frontend's native Vite dev server on
      # :3000) [see services/auth-service/README.md, "Gotchas" — Refresh
      # cookie requires HTTPS]. Commented by default — uncomment while using
      # that flow, never commit uncommented.
      # NODE_ENV: development
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    expose:
      - "4002"
    environment:
      PORT: "4002"
      DATABASE_URL: ${DATABASE_URL}
      AVATARS_DIR: /var/www/avatars
      GATEWAY_WS_URL: ws://gateway-ws:4500
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    volumes:
      - avatars_data:/var/www/avatars
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      gateway-ws:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  game-service:
    build:
      context: .
      dockerfile: services/game-service/Dockerfile
    environment:
      GATEWAY_WS_URL: ws://gateway-ws:4500
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    networks:
      - backend-net
    depends_on:
      gateway-ws:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  match-service:
    build:
      context: .
      dockerfile: services/match-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GATEWAY_WS_URL: ws://gateway-ws:4500
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    networks:
      - backend-net
    depends_on:
      gateway-ws:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ai-bot-service:
    build:
      context: .
      dockerfile: services/ai-bot-service/Dockerfile
    environment:
      GATEWAY_WS_URL:          ws://gateway-ws:4500
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    networks:
      - backend-net
    depends_on:
      gateway-ws:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Data ─────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ── Networks ───────────────────────────────────────────────────────────────────

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  avatars_data:
