name: CI

on:
  push:
    paths:
      - "services/**"
      - "docker-compose.yml"
      - "Makefile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main

# Jobs run sequentially: lint → typecheck → test → docker-build.
# Each stage uses a matrix over services so all services run in parallel within
# the stage. Adding a new service in future phases = one string in the matrix.
# needs: <stage> waits for ALL matrix variants of that stage to pass.

jobs:
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, gateway-api]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [auth-service, gateway-api]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        service: [auth-service, gateway-api]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [auth-service, gateway-api]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        run: docker build -f services/${{ matrix.service }}/Dockerfile -t mypong-${{ matrix.service }}:ci .
