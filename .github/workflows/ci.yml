name: CI

on:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "frontend/**"
      - "nginx/**"
      - "docker-compose.yml"
      - "Makefile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Backend jobs run sequentially: lint → typecheck → test → docker-build.
# Each stage uses a matrix over services so all services run in parallel within
# the stage. Adding a new service in future phases = one string in the matrix.
# needs: <stage> waits for ALL matrix variants of that stage to pass.
#
# Frontend runs as a single independent job (lint → typecheck → test → build),
# no matrix. nginx+frontend are deployed as one image (Public Edge), so the
# docker build of the nginx image (which includes the Vite build) runs here as
# the final step of this job — not as a separate matrix entry.

jobs:
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, gateway-api, gateway-ws, user-service, game-service, match-service, ia-bot-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [auth-service, gateway-api, gateway-ws, user-service, game-service, match-service, ia-bot-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        service: [auth-service, gateway-api, gateway-ws, user-service, game-service, match-service, ia-bot-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [auth-service, gateway-api, gateway-ws, user-service, game-service, match-service, ia-bot-service]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        run: docker build -f services/${{ matrix.service }}/Dockerfile -t mypong-${{ matrix.service }}:ci .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker build (nginx + frontend)
        working-directory: .
        run: docker build -f nginx/Dockerfile -t mypong-nginx:ci .
